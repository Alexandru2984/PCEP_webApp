# Template for /etc/nginx/sites-available/pcep.micutu.com
# Copy to that location and symlink into sites-enabled/. Reload nginx after.
# Certbot will rewrite this file on first run to add the SSL server block and redirect.

server {
    listen 80;
    listen [::]:80;
    server_name pcep.micutu.com;

    client_max_body_size 10M;

    # Certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Django static files (collected via collectstatic, copied to /var/www/pcep/static/)
    location /static/ {
        alias /var/www/pcep/static/;
        access_log off;
        expires 30d;
    }

    # Django media uploads
    location /media/ {
        alias /var/www/pcep/media/;
        access_log off;
    }

    # Django admin (proxied to Gunicorn on loopback)
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DRF API
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA (Vite build output copied to /var/www/pcep/frontend/)
    location / {
        root /var/www/pcep/frontend;
        try_files $uri $uri/ /index.html;
    }
}
