# Deployed to /etc/nginx/sites-available/pcep.micutu.com and symlinked into sites-enabled/.
# After `sudo certbot --nginx -d pcep.micutu.com`, Certbot rewrites this file:
#  - adds `listen 443 ssl` + cert paths inside the main server block
#  - adds a second server block on :80 that redirects to https
#
# This file is included from the http{} context, so the limit_req_zone below is valid here.

# Brute-force throttle for the Django admin login (per client IP).
limit_req_zone $binary_remote_addr zone=pcep_admin:10m rate=20r/m;

server {
    listen 80;
    listen [::]:80;
    include snippets/block-dotfiles.conf;
    server_name pcep.micutu.com;

    client_max_body_size 10M;

    # Django static (collected by collectstatic, copied to /var/www/pcep/static/)
    location /static/ {
        alias /var/www/pcep/static/;
        access_log off;
        expires 30d;
    }

    # Django media uploads
    location /media/ {
        alias /var/www/pcep/media/;
        access_log off;
    }

    # Django admin -> Gunicorn on loopback (rate-limited against brute-force)
    location /admin/ {
        limit_req zone=pcep_admin burst=10 nodelay;
        limit_req_status 429;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # DRF API -> Gunicorn on loopback
    location /api/ {
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # React SPA (Vite build output). Strict security headers live here: this is the
    # public, third-party-script-loading surface. (Admin keeps Django's own headers
    # and is intentionally excluded from the strict CSP so its UI isn't broken.)
    location / {
        root /var/www/pcep/frontend;
        try_files $uri $uri/ /index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # worker-src 'self'        -> the in-browser Python runner's Web Worker (/py-worker.js)
        # script-src 'wasm-unsafe-eval' -> lets Pyodide compile WebAssembly (no 'unsafe-eval' needed)
        # The Pyodide runtime is served same-origin from /pyodide/, so no third-party origin is added.
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; worker-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval' https://analytics.micutu.com; connect-src 'self' https://analytics.micutu.com" always;
    }
}
