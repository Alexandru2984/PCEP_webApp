services:
  db:
    image: postgres:16-alpine
    container_name: pcep_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcep_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      # Bound to loopback only — system nginx will reverse-proxy from pcep.micutu.com
      - "127.0.0.1:8001:8000"
    depends_on:
      db:
        condition: service_healthy

  # One-shot builder for the React app. Not started by `docker compose up`.
  # Run with: docker compose --profile build run --rm frontend-builder
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcep_frontend_build
    profiles:
      - build
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  static_volume:
  media_volume:
