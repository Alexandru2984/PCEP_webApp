name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Django + pytest + audit)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pcep_test
          POSTGRES_USER: pcep_user
          POSTGRES_PASSWORD: pcep_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pcep_user -d pcep_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
      DJANGO_DEBUG: "True"
      POSTGRES_DB: pcep_test
      POSTGRES_USER: pcep_user
      POSTGRES_PASSWORD: pcep_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Audit Python dependencies
        run: |
          python -m pip_audit -r requirements.txt
          python -m pip_audit -r requirements-dev.txt

      - name: Audit question bank
        env:
          DJANGO_SETTINGS_MODULE: pcep_project.test_settings
        run: python manage.py audit_questions --fail-on-warnings

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: pcep_project.settings
        run: python -m pytest -q

      - name: Django deploy check (production config)
        env:
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: a-sufficiently-long-production-secret-key-for-ci-only
          DJANGO_ALLOWED_HOSTS: pcep.example.com
        run: python manage.py check --deploy --fail-level WARNING

  frontend:
    name: Frontend (audit + lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright, mocked API)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  ops:
    name: Ops (compose config)
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: pcep_db
      POSTGRES_USER: pcep_user
      POSTGRES_PASSWORD: pcep_pass
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: pcep.example.com
      CORS_ALLOWED_ORIGINS: https://pcep.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config >/dev/null
