<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="canonical" href="https://pcep.micutu.com/" />
    <meta name="theme-color" content="#0f172a" />
    <title>
      PCEP Quiz — Practice for the Certified Entry-Level Python Programmer exam
    </title>
    <meta
      name="description"
      content="Free practice quiz for the PCEP (Certified Entry-Level Python Programmer) exam: 200+ questions across all four modules with instant feedback, per-option explanations, and a built-in Python code runner."
    />

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="PCEP Quiz — practice for the Python certification"
    />
    <meta
      property="og:description"
      content="200+ PCEP exam questions with instant feedback, explanations, and a run-it-yourself Python sandbox. Practice mode or timed exam simulation."
    />
    <meta property="og:url" content="https://pcep.micutu.com" />
    <meta name="twitter:card" content="summary" />

    <!-- Structured data: JSON-LD is a data block, exempt from script-src CSP. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PCEP Quiz",
        "url": "https://pcep.micutu.com/",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any modern web browser",
        "browserRequirements": "Requires JavaScript and WebAssembly",
        "description": "Free practice quiz for the PCEP — Certified Entry-Level Python Programmer exam: 200+ questions across all four syllabus modules with instant feedback, per-option explanations, and an in-browser Python code runner.",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "educationalUse": "self-assessment",
        "learningResourceType": "quiz",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "about": {
          "@type": "Thing",
          "name": "PCEP — Certified Entry-Level Python Programmer certification"
        }
      }
    </script>

    <!-- Apply saved theme before paint (external so the CSP can forbid inline scripts) -->
    <script src="/theme-init.js"></script>

    <!-- Umami analytics, reverse-proxied same-origin via /u/ (see nginx) so it
         needs no third-party CSP origin and isn't blocked by CORS/ad-blockers. -->
    <script
      defer
      src="/u/script.js"
      data-website-id="b37781f1-2c12-4d98-88f7-48cf10f000fd"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
